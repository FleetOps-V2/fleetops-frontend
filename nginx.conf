server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # AUTH
    location /api/auth/ {
        proxy_pass http://auth-service:8080/api/auth/;
    }

    location = /api/auth {
        proxy_pass http://auth-service:8080/api/auth;
    }

    # AUDIT (CloudTrail events → auth-service → CloudWatch Logs)
    location /api/audit/ {
        proxy_pass http://auth-service:8080/api/audit/;
    }

    # VEHICLES (FleetOps)
    location /api/vehicles/ {
        proxy_pass http://vehicle-service:8080/api/vehicles/;
    }

    location = /api/vehicles {
        proxy_pass http://vehicle-service:8080/api/vehicles;
    }

    # TASKS (FleetOps maintenance queue)
    location /api/tasks/ {
        proxy_pass http://maintenance-service:8080/api/tasks/;
    }

    location = /api/tasks {
        proxy_pass http://maintenance-service:8080/api/tasks;
    }

    # MEDIA (EFS shared inspection media vault)
    location /api/media/ {
        client_max_body_size 25M;
        proxy_pass http://maintenance-service:8080/api/media/;
    }

    # REQUESTS (FleetOps)
    location /api/requests/ {
        proxy_pass http://request-service:8080/api/requests/;
    }

    location = /api/requests {
        proxy_pass http://request-service:8080/api/requests;
    }

    # TRACKING (GPS telemetry — vehicle-service TrackingController)
    location /api/tracking/ {
        proxy_pass http://vehicle-service:8080/api/tracking/;
    }

    # K8s liveness/readiness probe endpoint
    location = /health {
        access_log off;
        return 200 'healthy\n';
        add_header Content-Type text/plain;
    }

    # React SPA — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

